body:
  text: 簫齊沙門釋曇景譯爾時世尊為波斯匿王及諸大衆説妙法已與比丘衆前後圍繞從舍衛國漸次遊行村邑聚落所應度者皆悉周遍乃至到於尼連禪河于時世尊既至河已著於浴衣入河洗浴時無量百千天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等既見如來在河澡浴各持種種塗香末香而來供養時尼連禪河側水陸虛空一切衆生見如來身猶如明鏡覩妙形像皆生歡喜悉起慈心三毒消伏不相吞食咸發阿耨多羅三藐三菩提心爾時阿難即白佛言今此水陸虛空之中諸衆生等見佛身已尚生歡喜發菩提心而提婆達多生在釋宮佛之親屬又作沙門口常讀誦深妙經典而於如來恆造逆事破和合僧出佛身血教阿闍世殺害父王日日招集豐美飲食而自憍慢謂與佛等為小利養以火自燒設令諸佛欲救拔之不能為益如騾懷妊會喪身命爾時世尊告阿難言如汝所説提婆達多恆於我所生怨害心自造阿鼻地獄因緣一切諸佛不能救脫我於提婆達多極生慈愍但其不久苦業所逼時提婆達多在佛左右聞此語已心大瞋恚即捨於佛與其弟子往摩竭提國投阿闍世而於中路有諸群烏急聲鳴喚翻飛亂擾又逢惡牛欲觸蹈之其諸弟子見此相已而語之言我等今者觀此諸瑞非為吉祥若所去處必無利益提婆達多而答之言汝等愚癡何所知耶但急隨我不須多云既到摩竭提國語守門者汝入白王道我在此時守門人即入白王阿闍世王聞提婆達多來在外已心大瞋恚而作是言乃至不欲聞其名字何況而應眼見之耶譬如雨雹摧折草木在地不久還自消散如此惡人亦復如是教人行惡壞他善根復還自敗善根種子敕守門者勿聽其前時提婆達多見阿闍世王不許前已心大苦惱舉手拍頭切齒罵詈時優波羅比丘尼從王宮出而於門外見提婆達多即呵之言汝今釋種不得熾盛於佛法中作大留礙時提婆達多聞此語已極大忿恚即以手捲而打其頭彼比丘尼尋便命終提婆達多又害羅漢比丘尼故地即開裂有大猛火纏繞其身牽入地獄爾時世尊澡浴訖已向諸比丘而説偈言譬如行惡道登涉長憂怖若到平坦處安隱無愁患生死險隘路衆生恆恐怖唯有涅槃道行者獲安隱我今欲至彼功德常樂處爾時世尊説此偈已與阿難俱至王舍城為衆比丘廣説諸法漸次到巴連弗邑為諸人民長者居士及梵志等廣説諸法漸次復到毗耶離城為衆離車及奈女等廣演諸法爾時世尊舉身疾生處處皆痛即便顧語尊者阿難我於今者身體皆痛唯欲捨此朽故之身阿難當知若比丘比丘尼得四神足則能住壽一劫在世若減一劫況復如來所欲自在是時阿難魔所蔽故默然無答乃至再三亦皆默然爾時世尊語阿難言汝今可往到一樹下專精思惟正觀諸法時魔波旬即來佛所稽首禮足而白佛言我於往昔勸請世尊入於涅槃于時世尊而答我言我諸弟子比丘比丘尼優婆塞優婆夷未具足故所以未應入於涅槃世尊今者諸四部衆皆悉具足所度已畢唯願善逝速入涅槃爾時世尊即答魔言善哉波旬當知如來却後三月入於涅槃時魔波旬見佛許已歡喜踊躍不能自勝頂禮佛足還歸天宮爾時如來既許天魔却後三月當入涅槃即便捨於無量之壽以神通力故住命三月于時大地六種震動日無精光風雨違常天龍八部莫不駭怖來至佛所側塞空中時尊者阿難見此相已心驚毛竪疾詣佛所而白佛言今者何緣忽有此相佛告阿難惡魔波旬向來我所勸請於我令入涅槃我已許之即便捨壽以神力故住命三月阿難白佛言世尊常説四神足人則能住壽一劫若減一劫隨意自在云何如來不久住世同於諸行于時如來答阿難言我向為汝説如此語魔蔽汝故不知請住我已許之云何住壽阿難當知一切諸行法皆如是不得常存爾時阿難聞佛此語迷悶懊惱不能自勝悲號啼泣深追悔責爾時世尊與阿難俱漸次遊行到諸國界村邑聚落廣説諸法所可化度不可稱計漸次復到鳩尸那竭國力士生地熙連河側娑羅雙樹間而語阿難可安繩床而令北首我今身體極大苦痛入於中夜當取涅槃阿難受教施繩床已佛即就臥右脅著地爾時阿難見佛臥已隱於佛後悲泣流淚極大苦惱世尊即便問諸比丘阿難今者為在何許諸比丘言近在於佛後垂淚憂惱如來即以大悲梵音告阿難言汝今不應猶如嬰兒而自啼泣所以者何生死之中皆悉如此但當專念思惟諸法汝從往昔看侍我來身口意業極為純善未曾見汝有毫過失今者宜應勤求解脫忍割悲心勿自煎惱爾時阿難而白佛言如來入於般涅槃後闍維之法當云何耶佛告阿難闍維之法如轉輪聖王取於千端新淨之㲲用纏佛身香油灑灌內金棺中又以金棺內銀棺中又以銀棺內銅棺中又以銅棺內鐵棺中積衆香薪而用闍維收拾舍利起立塔廟表剎幡蓋種種供養爾時世尊告阿難言汝今入城告諸力士道我在此夜入涅槃若欲來者宜自知時阿難受敕即便入城街巷道路高聲唱言三界大師如來應供今近在於雙樹之間當於中夜而取涅槃諸人若欲禮拜供養并欲咨決宜知是時時諸力士聞此語已皆大懊惱問阿難言世尊滅度一何駛哉我等從今無所依怙涕淚緣路往詣佛所時熙連河側娑羅雙樹周匝縱廣四百八十里天龍八部充塞盈滿間無空缺莫不戀慕悲號苦惱咸言世間失於慈父各相謂言我等從今方淪生死誰拔濟者爾時城中有一梵志名須跋陀羅年百二十歲聞佛近在雙樹之間當於中夜而入涅槃即往佛所白阿難言我聞如來一切智者當於中夜而入涅槃欲少決疑唯願聽前是時阿難心自念言今此梵志久習異見必於今者與佛論議世尊身痛而作擾亂即便默然不聽許之乃至三請亦復如是爾時世尊天耳遙聞語阿難言汝可聽是老梵志前此即是吾最後弟子須跋陀羅既見佛已歡喜踊躍頭面作禮爾時世尊隨應為説八正道法即於座上得羅漢果而白佛言生死苦海已蒙得過不忍當見大師涅槃我今當先而取滅度即於佛前入般涅槃爾時世尊為諸八部一切大衆説妙法已既至中夜涅槃時到而説偈言我於諸衆生應度緣今畢夜靜氣恬和涅槃時已到爾時世尊説此偈已即入初禪入初禪已復入二禪入二禪已次入三禪入三禪已次入四禪入四禪已次入空處入空處已次入識處入識處已次入無所有處入無所有處已次入非想非非想處入非想非非想處已次入滅盡正受時會大衆既見如來諸根不動即便問於阿那律言世尊今者入涅槃未時阿那律語諸人言世尊今入滅盡正受爾時如來出滅盡正受還入非想非非想處出非想非非想處還入無所有處出無所有處還入識處出於識處還入空處出於空處還入四禪出於四禪還入三禪出於三禪還入二禪出於二禪還入初禪即於初禪還入二禪出於二禪而入三禪出於三禪而入四禪出於四禪而入空處出於空處而入識處出於識處入無所有處出於無所有處入非想非非想處出非想非非想處入滅盡正受則於彼處而般涅槃當於爾時大地震動天龍八部悲泣騷擾時天帝釋及梵天王而説偈言生死無真實虛誑諸衆生今者牟尼尊棄之猶涕唾時諸衆生共相謂言如來滅度何其駛哉三界牢獄誰為解脫其中或有宛轉于地或有牽絶衣服瓔珞或拔頭髮捶胸大叫爾時阿難即便入城普告力士如來昨夜已入涅槃汝等宜應供養闍維諸力士等聞此語已心大苦痛皆悉相隨至雙樹所既見世尊已般涅槃悶絶震慟不能自勝即問阿難我等不知云何闍維如來之身阿難答言我於昨日已咨問佛世尊遺敕令如轉輪聖王闍維之法阿難具為次第説之諸力士衆聞此語已即便嚴辦供養之具事事皆依阿難所説如轉輪聖王棺殯之法爾時摩耶即於天上見五衰相一者頭上花萎二者腋下汗出三者頂中光滅四者兩目數瞬五者不樂本座又於其夜得五大惡夢一夢須彌山崩四海水竭二夢有諸羅剎手執利刀競挑一切衆生之眼時有黑風吹諸羅剎皆悉奔馳歸於雪山三夢欲色界諸天忽失寶冠自絶瓔珞不安本座身無光明猶如聚墨四夢如意珠王在高幢上恆雨珍寶周給一切有四毒龍口中吐火吹倒彼幢吸如意珠猛疾惡風吹沒深淵五夢有五師子從空來下嚙摩訶摩耶乳入於左脅身心疼痛如被刀劍時摩訶摩耶見此夢已即便驚寤而作是言我於向者眠寢之中忽然見此非吉祥事令我身心極為愁苦往昔在於白淨王宮因晝寢中得希有夢見一天子身黃金色乘白象王從諸天子作妙妓樂觀日之精入我右脅身心安樂無有痛惱即便懷妊悉達太子光顯宗族為世照明今此五夢甚可怖畏必是我子釋迦如來入般涅槃之惡相也即便向餘諸天子等廣説夢中所見諸事爾時尊者阿那律既見棺殯如來身已即便升於忉利天上往摩訶摩耶所而説是偈大師最勝天中天善導一切世間者今已為彼無常海摩竭大魚之所吞在於鳩尸那竭國娑羅林中雙樹間不久當出城東門種種供養而闍維天人八部衆盈溢號哭震動徹三千時阿那律説此偈已即便還下如來棺所爾時摩訶摩耶聞阿那律説此偈已悶絶躄地諸天女等以冷水灑面良久乃穌自拔頭髮絶莊嚴具悲泣垂淚而作此言我於昨夜得五惡夢決定當知佛入涅槃今者果見阿那律來云已滅度在雙樹間不久便應而就闍維何其苦哉世間眼滅何其疾哉人天福盡昔日在於白淨王宮始生七日我便命終竟未抱育展母子情付囑摩訶波闍波提令其姨母而乳養之及已長大至年十九便於中夜踰城而出舉宮內外莫不悲惱既成道已開世慧眼覆護一切猶如慈父如何一旦便入涅槃無常惡賊極為凶暴而能害我正覺之子即於衆中而説偈言於無量劫來常共為母子汝既成正覺此緣方永斷而復於今者便入般涅槃譬如高大樹衆鳥依共棲晨旦各分離到暮還歸集與汝為母子共在生死樹既得成道果長絶此源本又復取滅度無有會見期時摩訶摩耶説此偈已涕泣懊惱不能自勝與於無量諸天女等眷屬圍繞作妙妓樂燒香散花歌頌讚歎從空來下趣雙樹所到娑羅林中已遙見佛棺即大悶絶不能自勝諸天女等以水灑面然後方穌前至棺所頭頂作禮垂淚悲惱而作此言昔於過去無量劫來長為母子未曾捨離一旦於今無相見期嗚呼苦哉衆生福盡方當昏迷誰為開導即以天曼陀羅花摩訶曼陀羅花曼殊沙花摩訶曼殊沙花用散棺上而説偈言今此雙樹間天龍八部衆惟聞啼哭音不知何所説譬鸚鵡亂鳴不能解其語充塞在於地猶如折翮鳥不能起飛趣如來涅槃林曠劫積恩愛似遮迦羅鳥今者無常風吹散各異處在苦諸衆生悕望法甘露猶如蘭提鳥渴仰待天雨何故便於今而速入涅槃潛身重棺中知我來此不爾時摩訶摩耶説此偈已顧見如來僧伽梨衣及鉢多羅并以錫杖右手執之左手拍頭舉身投地如太山崩悲號慟絶而作是言我子昔日執著此等廣福世間利益天人今此諸物空無有主嗚呼苦哉痛不可言時諸八部及以四衆見摩訶摩耶憂惱如是倍更悲感淚下如雨帝釋力故變成河流爾時世尊以大神力故令諸棺蓋皆自開發便從棺中合掌而起如師子王初出窟時奮迅之勢身毛孔中放千光明一一光明有千化佛悉皆合掌向摩訶摩耶以梵軟音問訊母言遠屈來下此閻浮提諸行法爾願勿啼泣即便為母而説偈言一切福田中佛福田為最一切諸女中玉女寶為最今我所生母超勝無倫比能生於三世佛法僧之寶故我從棺起合掌歡喜歎用報所生恩示我孝戀情諸佛雖滅度法僧寶常住願母莫憂愁諦觀無上行爾時世尊説此偈已摩訶摩耶小自安慰顏色漸悅如蓮花敷于時阿難見佛起已又聞説偈垂淚嗚咽強自抑忍即便合掌而白佛言後世衆生必當問我世尊臨欲般涅槃時復何所説云何答之佛告阿難汝當答言世尊已入般涅槃後摩訶摩耶從天來下至金棺所爾時如來為後不孝諸衆生故從金棺出如師子王奮迅之勢身毛孔中放千光明一一光明有千化佛悉皆合掌向摩訶摩耶并又説於如上諸偈阿難又言當何名此經云何奉持佛告阿難我於昔日忉利天上為母説法及摩訶摩耶夫人自有所説今復在此母子相見汝可為後世諸衆生輩次第演説此經名曰摩訶摩耶經亦名佛升忉利天為母説法經又名佛臨涅槃母子相見經如是奉持爾時世尊説此語已與母辭別而説偈言我生分已盡梵行久已立所作皆已辦不受於後有願母自安慰不須苦憂惱一切行無常住是生滅法生滅既滅已寂滅為最樂爾時世尊説此語已即便闔棺三千大千世界普皆震動摩訶摩耶及衆八部悲泣懊惱不能自勝摩訶摩耶問阿難言我子悉達臨滅度時有何教敕阿難白言世尊中夜為諸比丘略説教誡又以所説十二部經付囑尊者摩訶迦葉亦復敕我令助宣布時摩訶摩耶聞此語已又增感絶即問阿難汝於往昔侍佛以來聞世尊説如來正法幾時當滅阿難垂淚而便答言我於往昔曾聞世尊説於當來法滅之後事云佛涅槃後摩訶迦葉共阿難結集法藏事悉畢已摩訶迦葉於狼迹山中入滅盡定我亦當得果證次第隨後入般涅槃當以正法付優婆掬多善説法要如富樓那廣説度人又復勸化阿輸迦王令於佛法得堅固正信以佛舍利廣起八萬四千諸塔二百歲已尸羅難陀比丘善説法要於閻浮提度十二億人三百歲已青蓮花眼比丘善説法要度半億人四百歲已牛口比丘善説法要度一萬人五百歲已寶天比丘善説法要度二萬人八部衆生發阿耨多羅三藐三菩提心正法於此便就滅盡六百歲已九十六種諸外道等邪見競興破滅佛法有一比丘名曰馬鳴善説法要降伏一切諸外道輩七百歲已有一比丘名曰龍樹善説法要滅邪見幢然正法炬八百歲後諸比丘等樂好衣服縱逸嬉戲百千人中或有一兩得道果者九百歲已奴為比丘婢為比丘尼一千歲已諸比丘等聞不淨觀阿那波那瞋恚不欲無量比丘若一若兩思惟正受千一百歲已諸比丘等如世俗人嫁娶行媒於大衆中毀謗毗尼千二百歲已是諸比丘及比丘尼作非梵行若有子息男為比丘女為比丘尼千三百歲已袈裟變白不受染色千四百歲已時諸四衆猶如獵師好樂殺生賣三寶物千五百歲俱睒彌國有三藏比丘善説法要徒衆五百又一羅漢比丘善持戒行徒衆五百於十五日布薩之時羅漢比丘升於高座説清淨法云此所應作此不應作彼三藏比丘弟子答羅漢言汝今身口自不清淨云何而反説是麁言羅漢答言我久清淨身口意業無諸過惡三藏弟子聞此語已倍更恚忿即於座上殺彼羅漢時羅漢弟子而作是言我師所説合於法理云何汝等害我和上即以利刀殺彼三藏天龍八部莫不憂惱惡魔波旬及外道衆踊躍歡喜競破塔寺殺害比丘一切經藏皆悉流移至鳩尸那竭國阿耨達龍王悉持入海於是佛法而滅盡也時摩訶摩耶聞此語已號哭懊惱即向阿難而説偈言一切皆歸滅無有常安者須彌及海水劫盡亦消竭世間諸豪強會必還衰朽我子於往昔勤苦集衆行故得成正覺為衆説經藏如何於爾時皆悉潛沒盡嗚呼生死法可畏可厭離爾時摩訶摩耶説此偈已語阿難言如來遺敕既以正法付囑尊者及摩訶迦葉宜應精勤護持誦説我今不忍見於如來闍維之時即禮佛棺右繞七匝涕淚號叫還歸天上于時娑羅雙樹間天人八部比丘比丘尼優婆塞優婆夷既見如來母子相見及聞所説有發無上道心者有得須陀洹者斯陀含者阿那含者阿羅漢者或有發於辟支佛心一切大衆受持佛語頂戴奉行摩訶摩耶經八國分舍利品第二爾時波婆國末羅民衆聞佛滅度皆自念言今我宜往求舍利分起塔供養即下國中嚴四種兵象兵馬兵車兵步兵到拘尸城遣使者言聞佛衆祐止此滅度彼亦我師敬慕之心來請骨分當於本國起塔供養拘尸王答如是如是誠如君言但佛世尊垂降此土於茲滅度國內士民當自供養遠勞諸君遺形舍利未得相與爾時遮羅頗國諸跋離民羅摩伽國拘利民衆毗留提國婆羅門衆迦維羅衛國釋種民衆毗提羅國離車民衆及摩竭王阿闍世等聞佛如來於拘尸城雙樹林間而取滅度皆自念言今我宜往求舍利分時諸國王阿闍世等各下國中嚴四種兵進渡恆水即敕婆羅門香姓汝持我名入拘尸城致問彼王諸末羅等起居輕利遊涉強耶吾於賢者每相崇敬鄰境義和曾無諍訟我聞如來於君國內而取滅度唯無上尊實我所天故從遠來求請骨分欲還本土起塔供養設以我者舉國重寶以居共之時香姓婆羅門受王教已即詣彼城語諸末羅末羅聞已報香姓曰誠如君言但為世尊垂降此土於茲滅度國內士民自當供養遠勞諸君舍利叵得爾時諸國王等則集群臣衆共立義而作頌曰法王無上尊在我國涅槃我今莊嚴塔安處而供養令具妙舍利光明遍十方所可化衆生云何得分析爾時諸國王説此偈已各自思惟我承如來遺形舍利得稟未來天人果報當獲多福而復告曰吾等和議遠來拜首遜言求分如不見以四兵在此不惜身命義而弗獲當以力巨時拘尸國即集群臣衆共立議以偈答曰如來大師在我國不期登趣證滅度遺留舍利如佛在晝夜勤心常戀仰情存法海度衆生冀得我今長供養遠勞諸君屈來拜求覓舍利真叵得爾時香姓婆羅門於諸王前立在一面長跪合掌而説偈答如來智慧大慈悲哀愍三千大千界其中説法遍十方乃至阿僧不可説憐愍衆生如一子恆河沙數心無息菩薩眷屬常往遊聲聞弟子恆來我説法演音如共聞圍繞紛綸同一説天人八部衆皆尋故我現今清淨海如來涅槃有舍利八分分之不得惜時諸國王聞此偈已心猶悵怏默然不許時香姓婆羅門更曉衆人諸賢長者受佛教戒口誦法言一切衆生常念欲安云何乃為諍佛舍利共相殘害如來遺形廣以利益無量衆生非止君等舍利今在唯當分之何應如是衆人聞之咸稱曰善尋復議言誰能堪為分舍利者皆曰香姓婆羅門仁智平均可使分之時諸國王即命香姓汝為我等分佛舍利均作八分於是香姓即到骨所頭面禮畢取佛上牙別置一面尋遣使者齎牙往詣阿闍世所語使者言以我所咨上白大王起居輕利遊涉強耶舍利諸國咸然以共今付使者如來上牙並可供養以慰企望明星出時集衆分之當自奉送是時香姓別置一瓶容受石許而分舍利均為八分諸國納已則告之言願持此瓶衆議見沾自欲於舍起塔供養咸共以之時有畢鉢村人來白衆言乞地焦炭起塔供養皆亦以之爾時拘尸國波婆國遮頗國羅摩伽國毗流提國迦維羅衛國毗舍離國摩竭國王阿闍世等得舍利分各歸其國起塔供養香姓婆羅門持舍利瓶而歸起塔畢鉢村人得地焦炭起塔供養後有銜國異道道士求得地灰亦還本國起塔供養此經末元有八國分舍利品約二紙半準校勘大藏竹堂講師批該此段經文自是涅槃後分經文不當在此然此已畢頂戴奉行下竺本無當與削去奉此已除各請詳悉至元二十年三月望後二日題記經末有八國分舍利品準校勘大藏竹堂正法師云是涅槃後分不當在此下竺藏本元無今削去至元二十年三月記
